services:

  postgres:
    # Existing PostgreSQL 12 volumes need dump/restore or pg_upgrade before using 14.
    container_name: postgres
    hostname: postgres
    image: postgres:14
    restart: always
    ports:
      - 5432:5432
    environment:
      # These init variables only apply when the PostgreSQL data directory is empty.
      POSTGRES_PASSWORD: redmine
      POSTGRES_DB: redmine
    volumes:
      - /home/gray.lin/redmine/postgresql:/var/lib/postgresql
      - /home/gray.lin/redmine/postgresql-data:/var/lib/postgresql/data
    networks:
      - netRedmine

  redmine:
    # Keep only persistent data mounted so the container can actually upgrade Redmine itself.
    container_name: redmine
    hostname: redmine
    image: redmine:6.1.2
    restart: always
    depends_on:
      - postgres
    ports:
      - 30002:3000
    environment:
      REDMINE_DB_POSTGRES: postgres
      # Use the default PostgreSQL superuser for compatibility with existing volumes.
      REDMINE_DB_USERNAME: postgres
      REDMINE_DB_PASSWORD: E8e6Hd82
      REDMINE_DB_DATABASE: redmine
      REDMINE_SECRET_KEY_BASE: supersecretkey
    volumes:
      - /home/gray.lin/redmine/files:/usr/src/redmine/files
    networks:
      - netRedmine

networks:
  netRedmine:

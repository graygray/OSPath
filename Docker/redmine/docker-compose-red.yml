services:

  postgres:
    container_name: postgres
    hostname: postgres
    image: postgres:14
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: redmine
      POSTGRES_PASSWORD: redmine
      POSTGRES_DB: redmine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redmine -d redmine"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - /home/gray.lin/redmine/postgresql-data:/var/lib/postgresql/data
    networks:
      - netRedmine

  redmine:
    # Keep only persistent data mounted so the container can actually upgrade Redmine itself.
    container_name: redmine
    hostname: redmine
    image: redmine:6.1.2
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 30002:3000
    environment:
      REDMINE_DB_POSTGRES: postgres
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: redmine
      REDMINE_DB_DATABASE: redmine
      REDMINE_SECRET_KEY_BASE: supersecretkey
    volumes:
      - /home/gray.lin/redmine/files:/usr/src/redmine/files
    networks:
      - netRedmine

networks:
  netRedmine:
